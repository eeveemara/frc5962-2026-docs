site_name: Team 5962 perSEVERE | Control System Docs
site_description: FRC Team 5962 control system documentation for the 2026 REBUILT season
docs_dir: docs

theme:
  name: material
  logo: team_logo.png
  favicon: team_logo.png
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - admonitions
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: README.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Telemetry System: architecture/telemetry-system.md
      - Fire Control Pipeline: architecture/fire-control-pipeline.md
      - Vision System: architecture/vision-system.md
      - Safety Architecture: architecture/safety-architecture.md
  - Driver Feedback:
      - AMDA Feedback System: feedback/driver-feedback.md
      - Alliance Strategy: feedback/alliance-strategy.md
      - Universal Design: feedback/universal-design.md
  - Dashboards:
      - Elastic Guide: dashboards/elastic-guide.md
      - AdvantageScope Guide: dashboards/advantagescope-guide.md
      - Quick Reference: dashboards/quick-reference.md
  - Operations:
      - Competition Playbook: operations/competition-playbook.md
      - Tuning Reference: operations/tuning-reference.md
      - Troubleshooting: operations/troubleshooting.md
  - Engineering:
      - Testing & Quality: engineering/testing-and-quality.md
      - Engineering Process: engineering/engineering-process.md
      - FMEA Log: engineering/fmea-log.md
      - Ball Physics Simulation: engineering/fuel-simulation.md
      - What We Learned: engineering/what-we-learned.md
